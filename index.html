<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <main id="app">
      <section id="game-shell" aria-label="軌道衛星パンチ">
        <div id="game-root"></div>
        <div id="hud" aria-live="polite">
          <div class="stat">
            <span>PLANET</span>
            <div class="meter"><div id="planet-hp-bar"></div></div>
          </div>
          <div class="stat compact">
            <span>SCORE</span>
            <strong id="score-value">0</strong>
          </div>
          <div class="stat compact">
            <span>WAVE</span>
            <strong id="wave-value">1</strong>
          </div>
          <div class="stat compact">
            <span>READY</span>
            <strong id="cooldown-value">OK</strong>
          </div>
        </div>
        <button id="tutorial-button" class="icon-button" type="button" aria-label="チュートリアルを開く" title="チュートリアル">
          ?
        </button>
        <div id="overlay" class="overlay">
          <div class="panel">
            <p class="kicker">Orbit Punch Prototype</p>
            <h1>軌道衛星パンチ</h1>
            <p class="summary">Space / Click / Tap で外向きパンチ。惑星に隕石を近づけるな。</p>
            <button id="start-button" type="button">Start</button>
          </div>
        </div>
      </section>
    </main>
  </body>
